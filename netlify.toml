# Netlify configuration — SVA AUT
# This is a plain static site (HTML/CSS/JS), so there is no build step.
# Netlify just publishes the repo root as-is.

[build]
  publish = "."
  # No build command needed for a static site.

# Long-cache the media assets (images/video); they rarely change.
[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Keep the CMS admin and content fresh (no aggressive caching).
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "no-cache"
